version: '3.8'

services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.insecure=true
      - --providers.docker
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  openwrt:
    image: ghcr.io/openwrt/rootfs:latest
    container_name: openwrt
    restart: always
    privileged: true
    networks:
      maclan:
        ipv4_address: 192.168.100.2
    volumes:
      - ./openwrt:/etc/config

networks:
  maclan:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.100.0/24
          gateway: 192.168.100.1
