version: "3.9"

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  openwrt:
    image: ghcr.io/openwrt/rootfs:latest
    privileged: true
    network_mode: "bridge"
    restart: always
    volumes:
      - ./openwrt/config:/etc/config
